<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-learning vs SARSA in Cliff Walking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Q-learning vs SARSA</h1>
            <p>Cliff Walking Environment (4x12) - Comparing Off-policy and On-policy learning.</p>
        </header>

        <main>
            <div class="controls-card">
                <div class="input-group rewards-group">
                    <div class="reward-input">
                        <label for="alpha">Learning Rate (&alpha;):</label>
                        <input type="number" id="alpha" value="0.1" min="0.01" max="1" step="0.01">
                    </div>
                    <div class="reward-input">
                        <label for="gamma">Discount Factor (&gamma;):</label>
                        <input type="number" id="gamma" value="0.9" min="0" max="1" step="0.1">
                    </div>
                    <div class="reward-input">
                        <label for="epsilon">Exploration Rate (&epsilon;):</label>
                        <input type="number" id="epsilon" value="0.1" min="0" max="1" step="0.01">
                    </div>
                    <div class="reward-input">
                        <label for="episodes">Episodes:</label>
                        <input type="number" id="episodes" value="500" min="10" max="5000" step="10">
                    </div>
                    <button id="train-btn" class="plan-btn" style="margin-top: 1.5rem; width: 100%;">Train Agents</button>
                </div>
            </div>

            <div id="results-section" class="results-section hidden">
                <div class="result-card" style="flex: 1 1 100%; max-width: 800px; margin: 0 auto;">
                    <h2 class="result-title">SARSA Policy (On-policy)</h2>
                    <div class="grid-wrapper">
                        <div class="grid-container" id="sarsa-policy-container">
                            <!-- Policy matrix cells injected via JS -->
                        </div>
                    </div>
                </div>

                <div class="result-card" style="flex: 1 1 100%; max-width: 800px; margin: 0 auto;">
                    <h2 class="result-title">Q-learning Policy (Off-policy)</h2>
                    <div class="grid-wrapper">
                        <div class="grid-container" id="qlearning-policy-container">
                            <!-- Policy matrix cells injected via JS -->
                        </div>
                    </div>
                </div>

                <div class="result-card chart-card" style="flex: 1 1 100%; max-width: 800px; margin: 0 auto;">
                    <h2 class="result-title">Learning Curve (Total Reward per Episode)</h2>
                    <canvas id="learningCurveChart"></canvas>
                </div>
            </div>


        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
